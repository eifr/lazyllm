version: 2

project_name: lazyllm

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: .
    binary: lazyllm

archives:
  - format: binary
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}{{ if eq .Os "windows" }}.exe{{ end }}

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github-native
